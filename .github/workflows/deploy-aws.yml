name: CI and Deploy to AWS

on:
  push:
    branches:
      - main
      - botwall
  workflow_dispatch:

concurrency:
  group: deploy-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: Run Tests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e .[dev]

      - name: Run test suite
        run: |
          pytest -q

  deploy:
    name: Deploy on AWS Host
    runs-on: ubuntu-latest
    needs: test
    if: github.event_name == 'workflow_dispatch' || github.ref_name == 'main' || github.ref_name == 'botwall'
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Deploy over SSH
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.AWS_HOST }}
          username: ${{ secrets.AWS_USER }}
          key: ${{ secrets.AWS_SSH_PRIVATE_KEY }}
          port: ${{ secrets.AWS_SSH_PORT }}
          script_stop: true
          script: |
            set -e
            export DEPLOY_DIR="${{ secrets.AWS_DEPLOY_DIR }}"
            export DEPLOY_BRANCH="${{ github.ref_name }}"
            export REPO_URL="${{ secrets.AWS_REPO_URL }}"
            export SERVICE_NAME="${{ secrets.AWS_SERVICE_NAME }}"
            export RUN_MIGRATIONS="${{ secrets.AWS_RUN_MIGRATIONS }}"
            export RUN_VALIDATE_LIVE="${{ secrets.AWS_RUN_VALIDATE_LIVE }}"

            bash "$DEPLOY_DIR/scripts/deploy_on_aws.sh"
