server {
    listen 80;
    server_name _;  # Accept any domain name

    # ── Internal: Bot detection check ─────────────────────────────────────
    location = /__bw_check {
        internal;
        proxy_pass http://127.0.0.1:4000/bw/check;
        proxy_pass_request_body off;
        proxy_set_header Content-Length "";
        proxy_method GET;
        proxy_set_header X-Original-URI $request_uri;
        proxy_set_header X-Forwarded-For $remote_addr;
        proxy_set_header User-Agent $http_user_agent;
        proxy_set_header Accept-Language $http_accept_language;
        proxy_set_header Cookie $http_cookie;
        proxy_set_header X-JA3 $http_x_ja3;
    }

    # ── SinkHole internal endpoints (SDK, beacons, gate) ──────────────────
    location ~ ^/(bw/|api/v1/analytics-ping|cdn-ping/perf|event/flow) {
        proxy_pass http://127.0.0.1:4000;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-For $remote_addr;
    }

    # ── Static assets: bypass bot detection (no scoring penalty) ──────────
    # WordPress/any site loads 20+ CSS/JS/image files per page.
    # Without this bypass, burst detection flags legitimate browsers as bots.
    location ~* \.(css|js|png|jpg|jpeg|gif|ico|svg|woff2?|ttf|eot|otf|webp|avif|mp4|webm|pdf|map)$ {
        proxy_pass http://wp:80;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-For $remote_addr;
    }

    # ── Main: All traffic goes through bot detection ──────────────────────
    location / {
        auth_request /__bw_check;
        auth_request_set $bw_decision $upstream_http_x_botwall_decision;

        # Gate: first-time visitor needs JS verification
        error_page 401 = @botwall_gate;

        # Decoy: bot detected → serve POISONED content at the SAME URL
        # The bot sees the same URL it requested, but gets fake content
        error_page 403 = @botwall_poison;

        # Clean traffic → forward to the real website
        proxy_pass http://wp:80;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-For $remote_addr;
    }

    # ── Gate: JS verification page ────────────────────────────────────────
    location @botwall_gate {
        return 302 /bw/gate/challenge?path=$request_uri;
    }

    # ── Poison: Serve poisoned content at the SAME URL (no redirect!) ─────
    # Bots see "/products" in their URL bar, but get poisoned content.
    # This makes it undetectable — the bot thinks it's scraping real pages.
    location @botwall_poison {
        proxy_pass http://127.0.0.1:4000/bw/poison?original_path=$request_uri;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-For $remote_addr;
        proxy_set_header X-Original-URI $request_uri;
        proxy_set_header User-Agent $http_user_agent;
        proxy_set_header Cookie $http_cookie;
    }

    # ── Legacy decoy endpoint (direct access) ────────────────────────────
    location ~ ^/content/archive/ {
        proxy_pass http://127.0.0.1:4000;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-For $remote_addr;
        proxy_set_header Cookie $http_cookie;
    }
}
