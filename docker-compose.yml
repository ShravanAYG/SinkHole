# ─────────────────────────────────────────────────────────────────────────────
# SinkHole + WordPress Demo
#
# Protects a WordPress site with bot detection + content poisoning.
#
# Deploy:
#   docker compose up -d --build
#
# Stop:
#   docker compose down
# ─────────────────────────────────────────────────────────────────────────────

services:
  # ── SinkHole: Bot detection gateway (port 80) ─────────────────────────────
  sinkhole:
    build: .
    ports:
      - "80:80"
    environment:
      - UPSTREAM_URL=http://wp:80
      - BOTWALL_SECRET_KEY=${BOTWALL_SECRET_KEY:-change-me-in-production}
      - BOTWALL_TELEMETRY_SECRET=${BOTWALL_TELEMETRY_SECRET:-change-me-in-production}
      - BOTWALL_POW_DIFFICULTY=2
      - BOTWALL_POW_ELEVATED_DIFFICULTY=3
    depends_on:
      wp:
        condition: service_started
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:4000/healthz"]
      interval: 30s
      timeout: 5s
      start_period: 15s
      retries: 3
    networks:
      - sinknet

  # ── WordPress: Demo website ───────────────────────────────────────────────
  wp:
    image: wordpress:latest
    environment:
      - WORDPRESS_DB_HOST=wp-db
      - WORDPRESS_DB_USER=wp
      - WORDPRESS_DB_PASSWORD=wp
      - WORDPRESS_DB_NAME=wp
    depends_on:
      wp-db:
        condition: service_started
    restart: unless-stopped
    networks:
      - sinknet

  # ── MariaDB: WordPress database ──────────────────────────────────────────
  wp-db:
    image: mariadb:lts
    environment:
      - MARIADB_DATABASE=wp
      - MARIADB_USER=wp
      - MARIADB_PASSWORD=wp
      - MARIADB_RANDOM_ROOT_PASSWORD=1
    volumes:
      - wp-data:/var/lib/mysql
    restart: unless-stopped
    networks:
      - sinknet

volumes:
  wp-data:

networks:
  sinknet:
    driver: bridge
