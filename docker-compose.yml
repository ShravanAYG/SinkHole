# ─────────────────────────────────────────────────────────────────────────────
# SinkHole — Use with ANY website
#
# Just change UPSTREAM_URL to your website and run:
#   docker compose up -d --build
#
# Examples:
#   UPSTREAM_URL=http://my-node-app:3000     (Node.js)
#   UPSTREAM_URL=http://my-php-app:80        (PHP / Apache)
#   UPSTREAM_URL=http://my-nextjs-app:3000   (Next.js)
#   UPSTREAM_URL=https://my-website.com      (External URL)
# ─────────────────────────────────────────────────────────────────────────────

services:
  sinkhole:
    build: .
    ports:
      - "80:80"
    environment:
      # ┌──────────────────────────────────────────────────────────────────┐
      # │  UPSTREAM_URL — The website you want to protect                 │
      # │  Point this at your web app's Docker container or external URL  │
      # └──────────────────────────────────────────────────────────────────┘
      - UPSTREAM_URL=http://host.docker.internal:3000

      # ── Security keys (CHANGE IN PRODUCTION!) ──
      - BOTWALL_SECRET_KEY=change-me-to-a-strong-random-key
      - BOTWALL_TELEMETRY_SECRET=change-me-key-for-cluster-sync

      # ── Optional: Redis for multi-instance deployments ──
      # - BOTWALL_REDIS_ENABLED=1
      # - BOTWALL_REDIS_URL=redis://redis:6379/0
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:4000/healthz"]
      interval: 30s
      timeout: 5s
      start_period: 15s
      retries: 3
    restart: unless-stopped

# ─────────────────────────────────────────────────────────────────────────────
# To protect a Docker-based website running on the same network:
#
#   services:
#     sinkhole:
#       ...
#       environment:
#         - UPSTREAM_URL=http://my-app:3000
#
#     my-app:
#       image: my-website:latest
#       expose:
#         - "3000"
# ─────────────────────────────────────────────────────────────────────────────
