worker_processes auto;
error_log /home/bb/sinkhole/logs/nginx_error.log;
pid /home/bb/sinkhole/pids/nginx.pid;

events {
    worker_connections 1024;
    use epoll;
    multi_accept on;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;
    
    log_format main '$remote_addr - $remote_user [$time_local] "$request" '
                    '$status $body_bytes_sent "$http_referer" '
                    '"$http_user_agent" "$http_x_forwarded_for" '
                    'decision=$http_x_botwall_decision score=$http_x_botwall_score';
    
    access_log /home/bb/sinkhole/logs/nginx_access.log main;
    
    # Botwall backend
    upstream botwall_backend {
        server 127.0.0.1:4000;
        keepalive 32;
    }
    
    server {
        listen 8000;
        server_name localhost;
        
        root /home/bb/sinkhole/static;
        
        # Stage 1: Check gate cookie
        location / {
            # Check gate status with botwall
            auth_request /_botwall_gate_check;
            auth_request_set $gate_ok $upstream_status;
            
            # If gate check fails, redirect to challenge
            error_page 401 = @gate_challenge;
            
            proxy_pass http://botwall_backend;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header X-Original-URI $request_uri;
        }
        
        # Internal gate check endpoint
        location = /_botwall_gate_check {
            internal;
            proxy_pass http://botwall_backend/bw/gate/check;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header Cookie $http_cookie;
            proxy_pass_request_body off;
            proxy_set_header Content-Length "";
        }
        
        # Gate challenge flow
        location @gate_challenge {
            proxy_pass http://botwall_backend/bw/gate/challenge?path=$request_uri;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        }
        
        # Botwall API endpoints (direct proxy)
        location /bw/ {
            proxy_pass http://botwall_backend;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }
        
        # API endpoints
        location /api/ {
            proxy_pass http://botwall_backend;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        }
        
        # Health check
        location /health {
            proxy_pass http://botwall_backend/healthz;
        }
        
        # Telemetry dashboard
        location /dashboard {
            proxy_pass http://botwall_backend/bw/dashboard;
        }
    }
}
