# ─────────────────────────────────────────────────────────────────────────────
# SinkHole Production — hacksinkhole.duckdns.org (65.1.166.8)
#
# Runs everything on one server:
#   - Nginx (port 80) — edge proxy
#   - Botwall (port 4000) — bot detection + content poisoning
#   - Origin (port 9000) — your demo website
#
# Deploy:
#   docker compose -f docker-compose.production.yml up -d --build
#
# ─── TO USE WITH ANY OTHER WEBSITE ───────────────────────────────────────
#
# Option A: Replace the "origin" service below with your website's Docker image
#           and update ORIGIN_PORT to match your app's port.
#
# Option B: Use the standalone all-in-one image (no compose needed):
#
#   docker run -p 80:80 \
#     -e UPSTREAM_URL=https://my-website.com \
#     -e BOTWALL_SECRET_KEY=$(openssl rand -hex 32) \
#     sinkhole:latest
#
# ─────────────────────────────────────────────────────────────────────────────

services:
  # ── Nginx: Edge proxy, port 80 ──────────────────────────────────────────
  nginx:
    image: nginx:alpine
    ports:
      - "80:80"
    volumes:
      - ./deploy/nginx-production.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - botwall
      - wp
    restart: unless-stopped

  # ── Botwall: Bot detection + content poisoning engine ───────────────────
  botwall:
    build:
      context: .
      dockerfile: Dockerfile.engine
    environment:
      - BOTWALL_HOST=0.0.0.0
      - BOTWALL_PORT=4000
      - BOTWALL_SECRET_KEY=${BOTWALL_SECRET_KEY:-change-me-in-production}
      - BOTWALL_TELEMETRY_SECRET=${BOTWALL_TELEMETRY_SECRET:-change-me-in-production}
      - BOTWALL_POW_DIFFICULTY=2
      - BOTWALL_POW_ELEVATED_DIFFICULTY=3
      - UPSTREAM_URL=http://wp:80
      # - BOTWALL_REDIS_ENABLED=1
      # - BOTWALL_REDIS_URL=redis://redis:6379/0
    expose:
      - "4000"
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:4000/healthz"]
      interval: 30s
      timeout: 5s
      start_period: 15s
      retries: 3
    restart: unless-stopped

  # ── WordPress: Your website ─────────────────────────────────────────────
  wp:
    image: wordpress:latest
    environment:
      - WORDPRESS_DB_HOST=wp-db
      - WORDPRESS_DB_USER=wp
      - WORDPRESS_DB_PASSWORD=wp
      - WORDPRESS_DB_NAME=wp
    depends_on:
      wp-db:
        condition: service_started
    restart: unless-stopped

  # ── MariaDB: WordPress database ─────────────────────────────────────────
  wp-db:
    image: mariadb:lts
    environment:
      - MARIADB_DATABASE=wp
      - MARIADB_USER=wp
      - MARIADB_PASSWORD=wp
      - MARIADB_RANDOM_ROOT_PASSWORD=1
    volumes:
      - wp-data:/var/lib/mysql
    restart: unless-stopped

volumes:
  wp-data:
