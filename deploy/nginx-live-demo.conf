worker_processes 1;

error_log logs/error.log info;
pid logs/nginx.pid;

events {
    worker_connections 512;
}

http {
    include /etc/nginx/mime.types;
    default_type application/octet-stream;

    client_body_temp_path temp/client_body;
    proxy_temp_path temp/proxy;
    fastcgi_temp_path temp/fastcgi;
    uwsgi_temp_path temp/uwsgi;
    scgi_temp_path temp/scgi;

    access_log logs/access.log;
    sendfile on;
    keepalive_timeout 65;

    map $http_cookie $has_bw_gate {
        default 0;
        ~*bw_gate= 1;
    }

    map $http_x_forwarded_proto $redirect_scheme {
        default $scheme;
        ~*https https;
    }

    upstream botwall_api {
        server 127.0.0.1:4101;
    }

    upstream demo_origin {
        server 127.0.0.1:9101;
    }

    server {
        listen 8089;
        server_name _;

        location = /__bw_check {
            internal;
            proxy_pass http://botwall_api/bw/check?path=$request_uri;
            proxy_pass_request_body off;
            proxy_set_header Content-Length "";
            proxy_set_header X-Original-URI $request_uri;
            proxy_set_header X-Forwarded-For $remote_addr;
            proxy_set_header User-Agent $http_user_agent;
            proxy_set_header Accept-Language $http_accept_language;
            proxy_set_header X-IP-Reputation $http_x_ip_reputation;
            proxy_set_header X-JA3 $http_x_ja3;
            proxy_set_header Cookie $http_cookie;
        }

        location ^~ /bw/ {
            proxy_pass http://botwall_api;
            proxy_set_header Host $host;
            proxy_set_header X-Forwarded-For $remote_addr;
            proxy_set_header User-Agent $http_user_agent;
            proxy_set_header Accept-Language $http_accept_language;
            proxy_set_header X-IP-Reputation $http_x_ip_reputation;
            proxy_set_header X-JA3 $http_x_ja3;
            proxy_set_header Cookie $http_cookie;
        }

        location = /healthz {
            proxy_pass http://botwall_api/healthz;
            proxy_set_header Host $host;
            proxy_set_header X-Forwarded-For $remote_addr;
        }

        location / {
            if ($has_bw_gate = 0) {
                return 302 $redirect_scheme://$http_host/bw/gate/challenge?path=$request_uri;
            }

            auth_request /__bw_check;
            auth_request_set $bw_decision $upstream_http_x_botwall_decision;

            if ($bw_decision = challenge) {
                return 302 $redirect_scheme://$http_host/bw/challenge?path=$request_uri;
            }
            if ($bw_decision = decoy) {
                return 302 $redirect_scheme://$http_host/bw/decoy/0;
            }

            proxy_pass http://demo_origin;
            proxy_set_header Host $host;
            proxy_set_header X-Forwarded-For $remote_addr;
            add_header X-Botwall-Decision $bw_decision always;
        }
    }
}
