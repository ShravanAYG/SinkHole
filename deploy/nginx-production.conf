worker_processes auto;

error_log /var/log/nginx/error.log info;
pid /var/run/nginx.pid;

events {
    worker_connections 1024;
}

http {
    include /etc/nginx/mime.types;
    default_type application/octet-stream;

    access_log /var/log/nginx/access.log;
    sendfile on;
    keepalive_timeout 65;

    # Docker internal DNS — resolves container names at request time
    resolver 127.0.0.11 valid=10s ipv6=off;

    # ── Gate cookie detection ─────────────────────────────────────────────
    map $http_cookie $has_bw_gate {
        default 0;
        ~*bw_gate= 1;
    }

    # ── Server: hacksinkhole.duckdns.org ──────────────────────────────────
    server {
        listen 80;
        server_name sinkholehack.duckdns.org 65.1.166.8 _;

        # Variables for dynamic resolution (not static upstream blocks)
        set $botwall_backend http://botwall:4000;
        set $origin_backend  http://wp:80;

        # ── Internal: Bot detection check ─────────────────────────────────
        location = /__bw_check {
            internal;
            proxy_pass $botwall_backend/bw/check?path=$request_uri;
            proxy_pass_request_body off;
            proxy_set_header Content-Length "";
            proxy_method GET;
            proxy_set_header X-Original-URI $request_uri;
            proxy_set_header X-Forwarded-For $remote_addr;
            proxy_set_header User-Agent $http_user_agent;
            proxy_set_header Accept-Language $http_accept_language;
            proxy_set_header X-IP-Reputation $http_x_ip_reputation;
            proxy_set_header X-JA3 $http_x_ja3;
            proxy_set_header Cookie $http_cookie;
        }

        # ── SinkHole endpoints (SDK, gate, beacons, decoy) ────────────────
        location ^~ /bw/ {
            proxy_pass $botwall_backend;
            proxy_set_header Host $host;
            proxy_set_header X-Forwarded-For $remote_addr;
            proxy_set_header User-Agent $http_user_agent;
            proxy_set_header Accept-Language $http_accept_language;
            proxy_set_header X-IP-Reputation $http_x_ip_reputation;
            proxy_set_header X-JA3 $http_x_ja3;
            proxy_set_header Cookie $http_cookie;
        }

        # ── Beacon ingestion endpoints ────────────────────────────────────
        location ~ ^/(api/v1/analytics-ping|cdn-ping/perf|event/flow) {
            proxy_pass $botwall_backend;
            proxy_set_header Host $host;
            proxy_set_header X-Forwarded-For $remote_addr;
        }

        # ── Legacy decoy content endpoint ─────────────────────────────────
        location ~ ^/content/archive/ {
            proxy_pass $botwall_backend;
            proxy_set_header Host $host;
            proxy_set_header X-Forwarded-For $remote_addr;
            proxy_set_header Cookie $http_cookie;
        }

        # ── Healthcheck ──────────────────────────────────────────────────
        location = /healthz {
            proxy_pass $botwall_backend/healthz;
            proxy_set_header Host $host;
        }

        # ── Static assets: bypass bot detection (no scoring penalty) ──────────
        # WordPress/any site loads 20+ CSS/JS/image files per page.
        # Without this bypass, burst detection flags legitimate browsers as bots.
        location ~* \.(css|js|png|jpg|jpeg|gif|ico|svg|woff2?|ttf|eot|otf|webp|avif|mp4|webm|pdf|map)$ {
            # Bypassing Botwall completely for these
            proxy_pass $origin_backend;
            proxy_set_header Host $host;
            proxy_set_header X-Forwarded-For $remote_addr;
        }

        # ── Main: All traffic goes through bot detection ──────────────────
        location / {
            # First-time visitors (no gate cookie) → JS verification page
            if ($has_bw_gate = 0) {
                return 302 $scheme://$http_host/bw/gate/challenge?path=$request_uri;
            }

            # Returning visitors → check with botwall
            auth_request /__bw_check;
            auth_request_set $bw_decision $upstream_http_x_botwall_decision;

            # Gate/challenge needed (401 from auth_request)
            error_page 401 = @botwall_gate;

            # Bot detected → serve poisoned content at the SAME URL (403 from auth_request)
            error_page 403 = @botwall_poison;

            # Clean traffic (200 from auth_request) → forward to origin website
            proxy_pass $origin_backend;
            proxy_set_header Host $host;
            proxy_set_header X-Forwarded-For $remote_addr;
            add_header X-Botwall-Decision $bw_decision always;
        }

        # ── Gate: redirect to JS verification ─────────────────────────────
        location @botwall_gate {
            return 302 $scheme://$http_host/bw/gate/challenge?path=$request_uri;
        }

        # ── Poison: Serve fake content at the same URL (transparent) ──────
        location @botwall_poison {
            proxy_pass $botwall_backend/bw/poison?original_path=$request_uri;
            proxy_set_header Host $host;
            proxy_set_header X-Forwarded-For $remote_addr;
            proxy_set_header X-Original-URI $request_uri;
            proxy_set_header User-Agent $http_user_agent;
            proxy_set_header Cookie $http_cookie;
        }
    }
}
